networks:
  network-napolitech:
    driver: bridge
  redis-net:
    driver: bridge

services:
  backend:
    build: .
    image: napolitech/backend-napolitech-dev:1.1.0
    container_name: backend-napolitech
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: back-end-napolitech

      DATASOURCE_URL: jdbc:mysql://db:3306/pizzaria_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DATASOURCE_USERNAME: napolitech
      DATASOURCE_PASSWORD: napolitech_dev
      DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver

      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0

      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: mailsendernoreplyv8@gmail.com
      MAIL_PASSWORD: gycihyclbdscmhor
      MAIL_SMTP_AUTH: true
      MAIL_SMTP_STARTTLS: true

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: napolitech
      BROKER_EXCHANGE_NAME: napolitech-exchange
      BROKER_QUEUE_NAME: pedidos-queue
      BROKER_ROUTING_KEY: pedidos-routing-key
      REDIS_HOST: redis

      OLLAMA_BASE_URL: http://ollama:11434

      # CORS: adicione a URL do ngrok aqui sem /api (ex: https://abc123.ngrok-free.app)
      # Suporta wildcards: https://*.ngrok-free.app
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081,http://localhost:19000,http://localhost:19006,http://10.0.2.2:8081}

      # JWT: mínimo 32 caracteres. Fixo em produção para não invalidar tokens ao reiniciar.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # URL base do frontend para links de reset de senha
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}

    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - network-napolitech
      - redis-net

  db:
    image: mysql:8.0
    container_name: mysql-napolitech
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: pizzaria_db
      MYSQL_USER: napolitech
      MYSQL_PASSWORD: napolitech_dev
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - network-napolitech

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-napolitech
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: napolitech
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - network-napolitech

  redis:
    image: redis:7-alpine
    container_name: redis
    command:
      [
        "redis-server",
        "--maxmemory", "512mb",
        "--maxmemory-policy", "allkeys-lfu",
        "--save", "60", "1",
        "--loglevel", "warning"
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - redis-net
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 10s

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - redis-net
    volumes:
      - redisinsight_data:/data

  # -------------------------------------------------------
  # ngrok — tunnel HTTPS para o backend (profile opcional)
  # Uso: docker compose --profile ngrok up
  # Requer: NGROK_AUTHTOKEN no ambiente (https://dashboard.ngrok.com/get-started/your-authtoken)
  # Depois de subir, acesse http://localhost:4040 para ver a URL pública gerada.
  # Copie a URL e atualize FRONTEND_ALLOWED_ORIGINS e EXPO_PUBLIC_API_BASE_URL.
  # -------------------------------------------------------
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-napolitech
    command: http backend:8080 --domain=internation-sully-kolten.ngrok-free.dev --log=stdout
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - backend
    networks:
      - network-napolitech
    profiles:
      - ngrok

  # IA - Ollama (modelos LLM local, upsell no checkout)
  # Apos subir os containers, baixe o modelo uma unica vez:
  #   docker exec ollama ollama pull llama3.2
  # Para CPU mais rapido use o modelo 1B: ollama pull llama3.2:1b
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - network-napolitech
    restart: unless-stopped

volumes:
  mysql_data:
  rabbitmq_data:
  redis_data:
  redisinsight_data:
  ollama_data:
