# Banco de dados em mem�ria pra testes
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ mockado
broker.exchange.name=test-exchange
broker.queue.name=test-queue

# Evita erro de conex�o
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Evita logs desnecess�rios
logging.level.org.springframework=ERROR

# IA - Ollama dev (aponta para localhost, upsell usa fallback se Ollama nao estiver rodando)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
